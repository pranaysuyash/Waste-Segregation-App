name: Markdown Lint

on:
  push:
    branches: [ main, develop ]
    paths: [ '**.md' ]
  pull_request:
    branches: [ main, develop ]
    paths: [ '**.md' ]

permissions:
  contents: write
  pull-requests: write

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install markdownlint-cli
      run: npm install -g markdownlint-cli
      
    - name: Run markdown lint
      run: |
        echo "🔍 Running Markdown Lint..."

        # On pull_request we must not attempt to auto-commit/push (refs/pull/*/merge is a hidden ref).
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          echo "PR mode: auto-fix locally in CI, but do not commit/push."
          markdownlint --fix docs/*.md *.md || true
          markdownlint docs/*.md *.md
          echo "✅ Markdown lint passed (PR mode)"
          exit 0
        fi

        echo "Push mode: running auto-fix (and committing if needed)."
        markdownlint --fix docs/*.md *.md || true
        markdownlint docs/*.md *.md
        echo "✅ Markdown lint passed after auto-fix"
        
    - name: Check for changes
      id: verify-changed-files
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "📝 Markdown files were auto-fixed"
        else
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "✅ No markdown changes needed"
        fi
        
    - name: Commit auto-fixes
      if: steps.verify-changed-files.outputs.changed == 'true' && github.event_name == 'push'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        git commit -m "🔧 Auto-fix markdown lint issues [skip ci]" || exit 0
        
    - name: Push changes
      if: steps.verify-changed-files.outputs.changed == 'true' && github.event_name == 'push'
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ github.ref }} 
