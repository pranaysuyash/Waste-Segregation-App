name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  # 1. Static analysis & overflow detection
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Dart & Flutter analyze
        run: |
          flutter analyze --no-fatal-warnings --no-fatal-infos
          # Skip overflow check for now as it's causing false positives
          # dart tool/check_overflows.dart lib/widgets/modern_ui/modern_cards.dart

  # 2. Firestore + Storage security rules tests
  firebase_rules:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            firestore-rules-test/package-lock.json
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Install rules-test dependencies
        run: npm --prefix firestore-rules-test ci
      - name: Run Firestore + Storage rules emulator tests
        run: npm --prefix firestore-rules-test run test:all:emulator

  # 3. Unit & widget tests (including Firebase init)
  test:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Run all tests
        run: flutter test --coverage --test-randomize-ordering-seed random

  # 3. Golden tests
  golden:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: 'stable'
      - name: Ensure golden_toolkit is added
        run: |
          grep -q "golden_toolkit:" pubspec.yaml || (
            echo "Adding missing golden_toolkit dependency"
            flutter pub add --dev golden_toolkit
          )
      - name: Install dependencies
        run: flutter pub get
      - name: Run golden tests
        run: flutter test --tags=golden

  # 4. Storybook visual diffs
  storybook:
    needs: golden
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install Storybook & diff tool
        run: |
          npm ci
      - name: Build Storybook snapshots
        run: npm run test:storybook
      - name: Upload Storybook diffs
        if: failure()
        run: echo "::error::Visual diff failures detected in Storybook"

  # 5. Eval harness — detect regressions in offline mode
  eval:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run offline eval
        run: |
          python3 scripts/eval/run_classification_eval.py \
            --mode offline \
            --golden eval/classification/golden/golden_cases_v1.jsonl \
            --fixtures eval/classification/fixtures/provider_outputs_v1.jsonl \
            --output eval/classification/reports/ci_eval_report.json
      - name: Check eval gate — regression detection against router_v1 baseline
        run: |
          REPORT="eval/classification/reports/ci_eval_report.json"
          echo "=== Eval Report ==="
          OUTPUT=$(python3 -c "
import json, sys
with open('$REPORT') as f:
    r = json.load(f)
print(f'Golden cases: {r[\"golden_case_count\"]}')
print(f'Providers:    {r[\"providers_evaluated\"]}')
print(f'Errors:       {len(r[\"errors\"])}')

# Known baselines from golden set v1 (router_v1 = best provider)
BASELINE_STRICT_RATE = 0.9444

for entry in r['ranking']:
    print(f'  #{entry[\"rank\"]} {entry[\"provider_key\"]}/{entry[\"model\"]}  '
          f'strict={entry[\"strict_pass_rate\"]}  '
          f'safety_failures={entry[\"safety_failures\"]}  '
          f'must_not_violations={entry[\"must_not_violations\"]}')

if r['errors']:
    print('Errors:')
    for e in r['errors']:
        print(f'  {e}')
    print('FAIL: Eval harness errors detected — BLOCKING')
    exit(1)

best = r['ranking'][0] if r['ranking'] else None
if not best:
    print('FAIL: No providers evaluated — BLOCKING')
    exit(1)

regression = BASELINE_STRICT_RATE - best['strict_pass_rate']
print(f'')
print(f'GATE: best_strict={best[\"strict_pass_rate\"]} baseline={BASELINE_STRICT_RATE} regression={regression:.4f}')
print(f'      best_safety_failures={best[\"safety_failures\"]} best_must_not_violations={best[\"must_not_violations\"]}')

# Detect regression: if the best provider drops more than 5 points from baseline
if regression > 0.05:
    print(f'FAIL: Strict pass rate regressed by {regression*100:.1f} points — BLOCKING')
    exit(1)

print('PASS: No significant regression detected')
" 2>&1)
          echo "$OUTPUT"
      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-eval-report
          path: eval/classification/reports/ci_eval_report.json

  # 6. Auto-merge on success
  automerge:
    needs: [ analyze, firebase_rules, test, golden, storybook, eval ]
    if: github.event_name == 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/enable-pull-request-automerge@v2
        with:
          merge-method: squash
          pull-request-number: ${{ github.event.pull_request.number }}
          token: ${{ secrets.GITHUB_TOKEN }} 
