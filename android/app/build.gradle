plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    // Add the Google services Gradle plugin
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
def adMobAppId = localProperties.getProperty('ADMOB_APP_ID') ?: ''

android {
    namespace = "com.pranaysuyash.wastewise"
    compileSdk = 35
    ndkVersion = "27.1.12297006"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.pranaysuyash.wastewise"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = 24 // Updated for security: API 24+ receives reasonable security updates
        targetSdk = 35
        versionCode = localProperties.getProperty('flutter.versionCode').toInteger()
        versionName = localProperties.getProperty('flutter.versionName')
        manifestPlaceholders = [adMobAppId: adMobAppId]
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists() && keystoreProperties['storeFile']) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            if (!keystorePropertiesFile.exists() || !keystoreProperties['storeFile']) {
                throw new GradleException("Missing key.properties for release signing")
            }
            if (!adMobAppId || adMobAppId.trim().isEmpty()) {
                throw new GradleException("Missing ADMOB_APP_ID in local.properties for release build")
            }
            if (adMobAppId == "ca-app-pub-3940256099942544~3347511713") {
                throw new GradleException("Refusing release build with test AdMob App ID")
            }
            signingConfig signingConfigs.release
            // Explicitly disable R8/Proguard until we have complete keep rules for
            // ML / TFLite delegate classes referenced by plugins. This prevents
            // release builds from failing with missing-class errors.
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Revert to stable Firebase BoM compatible with Kotlin 1.9.10
    implementation platform('com.google.firebase:firebase-bom:32.8.0')

    // Add the dependencies for Firebase products you want to use
    // When using the BoM, don't specify versions in Firebase dependencies
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-auth'
}
